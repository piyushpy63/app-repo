name: CI-CD-GitOps-Pipeline
on:
  push:
    branches: [ main ]
  workflow_dispatch:
env:
  IMAGE_NAME: piyush63/yourapp

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.10' }
      - run: pip install -r requirements.txt
      - run: pip install flake8 && flake8 . || true
      - run: pip install pytest || true && pytest || true

  docker:
    runs-on: ubuntu-latest
    needs: build-test
    outputs:
      tag: ${{ steps.set-tag.outputs.IMAGE_TAG }}
    steps:
      - uses: actions/checkout@v4

      # 1. This is REQUIRED for multi-platform builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. This creates the builder instance
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64  # Now this will actually work
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Set output tag
        id: set-tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_OUTPUT
  update-manifest:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Checkout manifest repo
        uses: actions/checkout@v4
        with:
          repository: piyushpy63/manifests-repo
          token: ${{ secrets.GIT_TOKEN }}
          path: manifests
      - name: Update deployment image tag
        run: |
          cd manifests
          # 3. Reference the output from the 'docker' job
          sed -i "s|image: .*|image: ${{ env.IMAGE_NAME }}:${{ needs.docker.outputs.tag }}|g" deployment.yaml
      - name: Commit & push
        run: |
          cd manifests
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add deployment.yaml
          git commit -m "chore: update image to ${{ needs.docker.outputs.tag }}" || echo "no changes to commit"
          git push
